name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install openslide
    
    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y openslide-tools
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[foundation]"
    
    - name: Install PyG extensions
      run: |
        python -c "import torch; print(f'Installing PyG for torch {torch.__version__}')"
        python -c "import torch, subprocess, sys; v=torch.__version__.split('+')[0]; subprocess.run([sys.executable, '-m', 'pip', 'install', 'torch-scatter', 'torch-sparse', '-f', f'https://data.pyg.org/whl/torch-{v}+cpu.html'], check=True)"
    
    - name: Run tests
      run: |
        pytest tests/ -v -m "not property and not slow" --cov=src --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
        fail_ci_if_error: false

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: Run flake8
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check black formatting
      run: |
        black --check src/ tests/
    
    - name: Check isort
      run: |
        isort --check-only src/ tests/

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install PyG extensions
      run: |
        python -c "import torch; print(f'Installing PyG for torch {torch.__version__}')"
        python -c "import torch, subprocess, sys; v=torch.__version__.split('+')[0]; subprocess.run([sys.executable, '-m', 'pip', 'install', 'torch-scatter', 'torch-sparse', '-f', f'https://data.pyg.org/whl/torch-{v}+cpu.html'], check=True)"
        pip install mypy types-PyYAML
    
    - name: Run mypy
      run: |
        mypy src/ --ignore-missing-imports --no-strict-optional
      continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml]
    
    - name: Run bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: pathology-api:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker run --rm pathology-api:test python -c "import src; print('Import successful')"

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check for broken links in markdown
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        config-file: '.github/markdown-link-check-config.json'
      continue-on-error: true
    
    - name: Validate YAML files
      run: |
        python -c "
        import yaml
        import sys
        from pathlib import Path
        
        yaml_files = list(Path('experiments/configs').glob('*.yaml'))
        yaml_files.append(Path('docker-compose.yml'))
        
        for f in yaml_files:
            try:
                with open(f) as file:
                    yaml.safe_load(file)
                print(f'✓ {f}')
            except Exception as e:
                print(f'✗ {f}: {e}')
                sys.exit(1)
        print(f'\nAll {len(yaml_files)} YAML files are valid')
        "

  quick-demo:
    name: Quick Demo Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[foundation]"
    
    - name: Install PyG extensions
      run: |
        python -c "import torch; print(f'Installing PyG for torch {torch.__version__}')"
        python -c "import torch, subprocess, sys; v=torch.__version__.split('+')[0]; subprocess.run([sys.executable, '-m', 'pip', 'install', 'torch-scatter', 'torch-sparse', '-f', f'https://data.pyg.org/whl/torch-{v}+cpu.html'], check=True)"
    
    - name: Run quick demo
      run: |
        python examples/run_quick_demo.py
      timeout-minutes: 10
    
    - name: Check demo outputs
      run: |
        test -f results/quick_demo/training_curves.png || exit 1
        test -f results/quick_demo/confusion_matrix.png || exit 1
        test -f results/quick_demo/tsne_embeddings.png || exit 1
        test -f models/quick_demo_model.pth || exit 1
        echo "All demo outputs generated successfully"
    
    - name: Upload demo results
      uses: actions/upload-artifact@v4
      with:
        name: quick-demo-results
        path: |
          results/quick_demo/
          models/quick_demo_model.pth

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[foundation]"
    
    - name: Install PyG extensions
      run: |
        python -c "import torch; print(f'Installing PyG for torch {torch.__version__}')"
        python -c "import torch, subprocess, sys; v=torch.__version__.split('+')[0]; subprocess.run([sys.executable, '-m', 'pip', 'install', 'torch-scatter', 'torch-sparse', '-f', f'https://data.pyg.org/whl/torch-{v}+cpu.html'], check=True)"
    
    - name: Generate coverage report
      run: |
        pytest tests/ -m "not property and not slow" --cov=src --cov-report=html --cov-report=term
    
    - name: Upload coverage HTML
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [test, lint, docker, docs, quick-demo]
    if: always()
    
    steps:
    - name: Check all jobs
      run: |
        if [ "${{ needs.test.result }}" != "success" ]; then
          echo "Tests failed"
          exit 1
        fi
        if [ "${{ needs.lint.result }}" != "success" ]; then
          echo "Linting failed"
          exit 1
        fi
        if [ "${{ needs.docker.result }}" != "success" ]; then
          echo "Docker build failed"
          exit 1
        fi
        if [ "${{ needs.docs.result }}" != "success" ]; then
          echo "Documentation checks failed"
          exit 1
        fi
        if [ "${{ needs.quick-demo.result }}" != "success" ]; then
          echo "Quick demo failed"
          exit 1
        fi
        echo "✓ All checks passed!"
