title: Medical AI Revolution
description: Comprehensive pathology AI platform with foundation models, explainability, and clinical deployment
baseurl: "/computational-pathology-research"
url: "https://matthewvaishnav.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Navigation
header_pages:
  - README.md
  - IMPLEMENTATION_STATUS.md
  - TRAINING_STATUS.md
  - MEDICAL_AI_REVOLUTION_PROGRESS.md

# Collections
collections:
  specs:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "specs"
    values:
      layout: "page"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Site metadata
author:
  name: Matthew Vaishnav
  email: matthew.vaishnav@example.com

social:
  github: matthewvaishnav
  linkedin: matthewvaishnav

# SEO
twitter:
  username: matthewvaishnav
  card: summary_large_image

# Analytics (optional)
google_analytics: # Add your GA tracking ID if needed

# Custom variables
project:
  name: Medical AI Revolution
  version: "1.0.0"
  status: "Production Ready"
  training_auc: "95.02%"
  tasks_completed: "96/96"
  phases_completed: "7/7"