# Navigation
navigation:
  - title: Home
    url: /
  - title: Documentation
    url: /DOCS_INDEX.html
  - title: GitHub
    url: https://github.com/matthewvaishnav/computational-pathology-research

# Plugins
plugins:
  - jekyll-relative-links

# Relative links configuration
relative_links:
  enabled: true
  collections: true

