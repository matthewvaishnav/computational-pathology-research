title: HistoCore
description: Production-grade PyTorch framework for computational pathology research with 3,006 tests, 8-12x training optimization, federated learning, and PACS integration
theme: jekyll-theme-minimal
logo: /assets/logo.svg?v=2
show_downloads: true
github:
  repository_url: https://github.com/matthewvaishnav/computational-pathology-research
  is_project_page: true
  owner_name: Matthew Vaishnav
