# Multi-GPU PatchCamelyon training configuration
# Optimized for distributed training across multiple GPUs

data:
  root_dir: "data/pcam_real"
  num_workers: 4  # Increased for multi-GPU
  pin_memory: true
  prefetch_factor: 2
  download: false

model:
  embed_dim: 256
  
  feature_extractor:
    model: "resnet18"
    pretrained: true
    feature_dim: 512
  
  wsi:
    input_dim: 512
    hidden_dim: 512
    num_heads: 8
    num_layers: 2
    pooling: "mean"

task:
  type: "classification"
  
  classification:
    hidden_dims: [128]
    dropout: 0.3

training:
  batch_size: 32  # Per GPU batch size
  num_epochs: 20
  learning_rate: 0.001  # Increased for multi-GPU
  weight_decay: 0.0001
  max_grad_norm: 1.0
  use_amp: true  # Enable mixed precision for faster training
  
  optimizer:
    name: "adamw"
    betas: [0.9, 0.999]
  
  scheduler:
    name: "cosine"
    min_lr: 1e-6

validation:
  interval: 1
  metric: "val_auc"
  maximize: true

checkpoint:
  checkpoint_dir: "checkpoints/pcam_multigpu"
  save_interval: 5
  save_best: true

early_stopping:
  enabled: true
  patience: 10
  min_delta: 0.001

# Multi-GPU specific settings
distributed:
  backend: "nccl"  # Use NCCL for GPU communication
  find_unused_parameters: true

seed: 42

logging:
  log_dir: "logs/pcam_multigpu"
  log_interval: 100
  use_tensorboard: true
  use_wandb: false