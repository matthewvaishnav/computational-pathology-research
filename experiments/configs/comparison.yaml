# Model Comparison Configuration
# Compare attention-based MIL models with baseline pooling methods

experiment:
  name: attention_model_comparison
  description: Compare AttentionMIL, CLAM, TransMIL with mean/max pooling baselines
  tags: [camelyon, attention, comparison]

data:
  dataset: camelyon16
  root_dir: ./data/camelyon
  download: false
  num_workers: 2
  pin_memory: true

  slide:
    patch_size: 256
    patch_level: 0
    stride: 256
    background_threshold: 0.5
    max_patches_per_slide: 1000

  augmentation:
    enabled: false

model:
  modalities: [wsi]
  embed_dim: 512

  feature_extractor:
    model: resnet50
    pretrained: true
    feature_dim: 2048
    freeze_backbone: false

  wsi:
    model_type: mean  # Will be overridden by comparison script
    hidden_dim: 256
    dropout: 0.3

    # AttentionMIL-specific config
    attention_mil:
      gated: true
      attention_mode: instance

    # CLAM-specific config
    clam:
      num_clusters: 10
      multi_branch: true
      instance_loss_weight: 0.3

    # TransMIL-specific config
    transmil:
      num_layers: 2
      num_heads: 8
      use_pos_encoding: true

task:
  type: classification
  num_classes: 2

  classification:
    hidden_dims: [256, 128]
    dropout: 0.3
    activation: relu

training:
  num_epochs: 10  # Reduced for comparison
  batch_size: 4  # Small batch for slide-level
  learning_rate: 1e-4
  weight_decay: 1e-5

  optimizer:
    name: adamw
    betas: [0.9, 0.999]
    eps: 1e-8

  scheduler:
    name: cosine
    min_lr: 1e-6
    warmup_epochs: 1

  max_grad_norm: 1.0
  use_amp: false
  gradient_accumulation_steps: 1

validation:
  interval: 1
  metric: val_auc
  maximize: true

checkpoint:
  save_interval: 5
  save_best: true
  checkpoint_dir: ./checkpoints/comparison

# Comparison-specific settings
comparison:
  models: [mean, max, attention_mil, clam, transmil]  # Models to compare
  output_dir: ./results/comparison
  generate_roc_curves: true
  statistical_tests: true

early_stopping:
  enabled: false
  patience: 10
  min_delta: 0.001

logging:
  log_dir: ./logs/comparison
  log_interval: 10
  use_tensorboard: false

evaluation:
  generate_plots: true
  output_dir: ./results/comparison
  save_predictions: true
  compute_slide_metrics: true

seed: 42
device: cuda
