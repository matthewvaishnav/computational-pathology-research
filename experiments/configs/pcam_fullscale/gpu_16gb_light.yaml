experiment:
  name: pcam_fullscale_light
  description: Lightweight PCam training - reduced batch size for laptop
  tags: [pcam, fullscale, laptop-friendly]

data:
  dataset: pcam
  root_dir: ./data/pcam
  download: false  # Dataset already downloaded
  num_workers: 0  # Windows: avoid multiprocessing issues
  pin_memory: false  # Reduce memory pressure

model:
  modalities: [wsi]
  embed_dim: 256
  feature_extractor:
    model: resnet18
    pretrained: true
    feature_dim: 512
  wsi:
    input_dim: 512
    hidden_dim: 256
    num_heads: 4
    num_layers: 1

task:
  type: classification
  num_classes: 2
  classification:
    hidden_dims: [128]
    dropout: 0.1

training:
  num_epochs: 5  # Reduced for faster completion
  batch_size: 32  # Reduced from 128 to lower GPU/CPU load
  learning_rate: 1e-3
  weight_decay: 1e-4
  use_amp: true  # Mixed precision
  max_grad_norm: 1.0
  gradient_accumulation_steps: 4  # Simulate batch_size=128
  dropout: 0.1
  optimizer:
    type: adamw
    betas: [0.9, 0.999]
  scheduler:
    type: cosine
    min_lr: 1e-6

validation:
  interval: 1
  metric: val_auc
  maximize: true

early_stopping:
  enabled: true
  patience: 3  # Reduced patience
  min_delta: 0.001

checkpoint:
  save_interval: 2
  save_best: true
  checkpoint_dir: ./checkpoints/pcam_fullscale_light

logging:
  log_dir: ./logs/pcam_fullscale_light
  log_interval: 200  # Log less frequently
  use_tensorboard: false  # Disable to reduce overhead

evaluation:
  generate_plots: true
  output_dir: ./results/pcam_fullscale_light
  compute_bootstrap_ci: false  # Disable for speed
  bootstrap_samples: 1000
  confidence_level: 0.95

seed: 42
device: cuda
