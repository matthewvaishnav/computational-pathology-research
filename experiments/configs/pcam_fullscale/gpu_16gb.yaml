experiment:
  name: pcam_fullscale_gpu16gb
  description: Full-scale PCam training on 262K samples (16GB GPU)
  tags: [pcam, fullscale, gpu-optimized, 16gb]

data:
  dataset: pcam
  root_dir: ./data/pcam
  download: true  # Enable automatic download of full dataset
  # NOTE: This config is for FULL-SCALE training on 262K samples
  # For quick testing with synthetic data, use configs in parent directory
  num_workers: 6  # Parallel data loading
  pin_memory: true  # Fast CPU-to-GPU transfer

model:
  modalities: [wsi]
  embed_dim: 256
  feature_extractor:
    model: resnet18
    pretrained: true
    feature_dim: 512
  wsi:
    input_dim: 512
    hidden_dim: 256
    num_heads: 4
    num_layers: 1

task:
  type: classification
  num_classes: 2
  classification:
    hidden_dims: [128]
    dropout: 0.1

training:
  num_epochs: 20
  batch_size: 128  # Optimized for 16GB GPU
  learning_rate: 1e-3
  weight_decay: 1e-4
  use_amp: true  # Mixed precision for faster training
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1
  dropout: 0.1
  optimizer:
    type: adamw
    betas: [0.9, 0.999]
  scheduler:
    type: cosine
    min_lr: 1e-6

validation:
  interval: 1
  metric: val_auc
  maximize: true

early_stopping:
  enabled: true
  patience: 5
  min_delta: 0.001

checkpoint:
  save_interval: 5
  save_best: true
  checkpoint_dir: ./checkpoints/pcam_fullscale_gpu16gb

logging:
  log_dir: ./logs/pcam_fullscale_gpu16gb
  log_interval: 100
  use_tensorboard: true

evaluation:
  generate_plots: true
  output_dir: ./results/pcam_fullscale_gpu16gb
  compute_bootstrap_ci: true
  bootstrap_samples: 1000
  confidence_level: 0.95

seed: 42
device: cuda
