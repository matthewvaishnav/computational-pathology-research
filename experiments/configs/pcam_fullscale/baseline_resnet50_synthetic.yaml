experiment:
  name: pcam_fullscale_baseline_resnet50_synthetic
  description: Full-scale PCam pipeline test with ResNet-50 baseline on synthetic subset (500 samples)
  tags: [pcam, fullscale, baseline, resnet50, synthetic, test]

data:
  dataset: pcam
  root_dir: ./data/pcam
  download: false  # Use existing synthetic data
  num_workers: 0  # Set to 0 for Windows compatibility
  pin_memory: false  # Disable since running on CPU

model:
  modalities: [wsi]
  embed_dim: 256
  feature_extractor:
    model: resnet50  # ResNet-50 baseline
    pretrained: true
    feature_dim: 2048  # ResNet-50 output dimension
  wsi:
    input_dim: 2048  # Match ResNet-50 output
    hidden_dim: 256
    num_heads: 4
    num_layers: 1

task:
  type: classification
  num_classes: 2
  
  classification:
    hidden_dims: [128]
    dropout: 0.3

training:
  num_epochs: 3  # Reduced for quick testing
  batch_size: 16  # Reduced for ResNet-50 memory requirements
  learning_rate: 1e-3
  weight_decay: 1e-4
  use_amp: true
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1
  
  optimizer:
    name: adamw
    betas: [0.9, 0.999]
  
  scheduler:
    name: cosine
    min_lr: 1e-6
    warmup_epochs: 1

validation:
  interval: 1
  metric: val_auc
  maximize: true

early_stopping:
  enabled: true
  patience: 3  # Reduced for quick testing
  min_delta: 0.001

checkpoint:
  save_interval: 2
  save_best: true
  checkpoint_dir: ./checkpoints/pcam_fullscale_resnet50_synthetic

logging:
  log_dir: ./logs/pcam_fullscale_resnet50_synthetic
  log_interval: 10
  use_tensorboard: true

evaluation:
  generate_plots: true
  output_dir: ./results/pcam_fullscale_resnet50_synthetic
  compute_bootstrap_ci: true
  bootstrap_samples: 100  # Reduced for quick testing
  confidence_level: 0.95

seed: 42
device: cuda