# PatchCamelyon FAST + IMPROVED configuration
# Goal: 94-95% test AUC in 2-3 hours (not 8.5 hours)
# Strategy: Keep ResNet18 for speed, add improvements for better performance

data:
  root_dir: "data/pcam_real"
  num_workers: 0
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: false
  download: false

model:
  embed_dim: 256  # Keep baseline
  
  feature_extractor:
    model: "resnet18"
    pretrained: true
    feature_dim: 512
  
  wsi:
    input_dim: 512
    hidden_dim: 512  # Keep baseline
    num_heads: 8  # Keep baseline
    num_layers: 2  # Keep baseline (not 3)
    pooling: "mean"  # Keep baseline (not attention)

task:
  type: "classification"
  
  classification:
    hidden_dims: [128]  # Keep 1-layer (not 2-layer)
    dropout: 0.5  # Strong dropout

training:
  batch_size: 128
  num_epochs: 25
  learning_rate: 0.0005
  weight_decay: 0.01  # 10x stronger than baseline
  max_grad_norm: 1.0
  use_amp: true
  dropout: 0.3
  
  use_torch_compile: false
  channels_last: true
  
  warmup_epochs: 1
  warmup_start_lr: 0.000001
  
  optimizer:
    name: "adamw"
    betas: [0.9, 0.999]
  
  scheduler:
    name: "cosine"
    min_lr: 1e-7

validation:
  interval: 1
  metric: "val_auc"
  maximize: true

checkpoint:
  checkpoint_dir: "checkpoints/pcam_fast_improved"
  save_interval: 5
  save_best: true

early_stopping:
  enabled: true
  patience: 7
  min_delta: 0.0005

device: "cuda"
cudnn_benchmark: true
seed: 42
  
logging:
  log_dir: "logs/pcam_fast_improved"
  log_interval: 50
  use_tensorboard: true
  use_wandb: false
