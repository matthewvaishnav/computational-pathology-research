# PatchCamelyon BASELINE configuration (NO optimizations)
# This is the unoptimized baseline for fair comparison

data:
  root_dir: "data/pcam_real"
  num_workers: 0  # Windows limitation
  pin_memory: false  # DISABLED for baseline
  prefetch_factor: 2
  persistent_workers: false
  download: false

model:
  embed_dim: 256
  
  feature_extractor:
    model: "resnet18"
    pretrained: true
    feature_dim: 512
  
  wsi:
    input_dim: 512
    hidden_dim: 512  # Same as optimized
    num_heads: 8     # Same as optimized
    num_layers: 2    # Same as optimized
    pooling: "mean"

task:
  type: "classification"
  
  classification:
    hidden_dims: [128]  # Same as optimized
    dropout: 0.3

training:
  batch_size: 64   # SMALLER batch (no optimization)
  num_epochs: 25   # MORE epochs (no early stopping)
  learning_rate: 0.001
  weight_decay: 0.01
  max_grad_norm: 1.0
  use_amp: false  # DISABLED - no mixed precision
  dropout: 0.3
  
  use_torch_compile: false  # DISABLED
  channels_last: false      # DISABLED
  
  warmup_epochs: 2
  
  optimizer:
    name: "adamw"
    betas: [0.9, 0.999]
  
  scheduler:
    name: "cosine"
    min_lr: 1e-6

validation:
  interval: 1  # Validate every epoch
  metric: "val_auc"
  maximize: true

checkpoint:
  checkpoint_dir: "checkpoints/pcam_baseline"
  save_interval: 5
  save_best: true

early_stopping:
  enabled: false  # DISABLED for baseline
  patience: 5
  min_delta: 0.001

device: "cuda"
cudnn_benchmark: false  # DISABLED for baseline
seed: 42
  
logging:
  log_dir: "logs/pcam_baseline"
  log_interval: 50
  use_tensorboard: true
  use_wandb: false
