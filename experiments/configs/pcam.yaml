# PatchCamelyon Experiment Configuration
# Binary classification of metastatic vs normal tissue patches

experiment:
  name: patchcamelyon
  description: Binary classification on PatchCamelyon dataset
  tags: [pcam, single-modality, baseline]

data:
  dataset: pcam
  root_dir: ./data/pcam
  download: true
  num_workers: 4
  pin_memory: true
  
  # Feature extraction
  extract_features: true
  feature_extractor:
    model: resnet18
    pretrained: true
    feature_dim: 512
  
  # Augmentation
  augmentation:
    enabled: true
    random_horizontal_flip: true
    random_vertical_flip: true
    color_jitter:
      brightness: 0.1
      contrast: 0.1
      saturation: 0.1
      hue: 0.05

model:
  # Single modality mode
  modalities: [wsi]
  embed_dim: 256

  # Feature extractor configuration
  feature_extractor:
    model: resnet18
    pretrained: true
    feature_dim: 512

  wsi:
    input_dim: 512  # ResNet-18 feature dim
    hidden_dim: 256
    num_heads: 4
    num_layers: 1
    pooling: mean  # Simple mean pooling for single patch

task:
  type: classification
  num_classes: 2  # Dataset has 2 classes (0=normal, 1=tumor); model outputs 1 logit for BCE

  classification:
    hidden_dims: [128]
    dropout: 0.3

training:
  num_epochs: 20
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4

  optimizer:
    name: adamw
    betas: [0.9, 0.999]

  scheduler:
    name: cosine
    min_lr: 1e-6
    warmup_epochs: 2

  max_grad_norm: 1.0
  use_amp: true  # Mixed precision

validation:
  interval: 1
  metric: val_auc
  maximize: true

checkpoint:
  save_interval: 5
  save_best: true
  checkpoint_dir: ./checkpoints/pcam

early_stopping:
  enabled: true
  patience: 5
  min_delta: 0.001

logging:
  log_dir: ./logs/pcam
  log_interval: 50
  use_tensorboard: true

evaluation:
  generate_plots: true
  output_dir: ./results/pcam

seed: 42
device: cuda
