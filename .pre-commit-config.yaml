# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Installation:
#   pip install pre-commit
#   pre-commit install
#
# Usage:
#   pre-commit run --all-files  # Run on all files
#   pre-commit run <hook-id>    # Run specific hook
#   git commit                  # Hooks run automatically
#
# Update hooks:
#   pre-commit autoupdate

default_language_version:
  python: python3.10

repos:
  # ============================================================================
  # General file checks
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # File formatting
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
      
      - id: end-of-file-fixer
        name: Fix end of files
      
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]
      
      # File checks
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=10000]  # 10MB limit
      
      - id: check-case-conflict
        name: Check for case conflicts
      
      - id: check-merge-conflict
        name: Check for merge conflicts
      
      - id: check-symlinks
        name: Check for broken symlinks
      
      # Python checks
      - id: check-ast
        name: Check Python AST
      
      - id: check-builtin-literals
        name: Check builtin literals
      
      - id: check-docstring-first
        name: Check docstring first
      
      - id: debug-statements
        name: Check for debug statements
      
      - id: name-tests-test
        name: Check test naming
        args: [--pytest-test-first]
      
      # JSON/YAML checks
      - id: check-json
        name: Check JSON syntax
      
      - id: check-yaml
        name: Check YAML syntax
        args: [--allow-multiple-documents]
      
      - id: check-toml
        name: Check TOML syntax
      
      # Other checks
      - id: check-executables-have-shebangs
        name: Check executables have shebangs
      
      - id: check-shebang-scripts-are-executable
        name: Check shebang scripts are executable

  # ============================================================================
  # Python code formatting
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format code with Black
        language_version: python3.10
        args: [--line-length=100]

  # ============================================================================
  # Import sorting
  # ============================================================================
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort imports with isort
        args: [--profile=black, --line-length=100]

  # ============================================================================
  # Linting
  # ============================================================================
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint with flake8
        args:
          - --max-line-length=100
          - --extend-ignore=E203,W503,E501
          - --max-complexity=15
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-simplify

  # ============================================================================
  # Type checking
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Type check with mypy
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --warn-redundant-casts
          - --warn-unused-ignores
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - types-setuptools
        exclude: ^(tests/|docs/|examples/)

  # ============================================================================
  # Security checks
  # ============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Security check with bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  # ============================================================================
  # Docstring checks
  # ============================================================================
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        name: Check docstrings
        args:
          - --convention=google
          - --add-ignore=D100,D104,D105,D107
        exclude: ^(tests/|docs/|examples/)

  # ============================================================================
  # Notebook checks
  # ============================================================================
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.7.1
    hooks:
      - id: nbqa-black
        name: Format notebooks with black
        args: [--line-length=100]
      
      - id: nbqa-isort
        name: Sort notebook imports
        args: [--profile=black]
      
      - id: nbqa-flake8
        name: Lint notebooks
        args: [--max-line-length=100, --extend-ignore=E203,W503]

  # ============================================================================
  # YAML formatting
  # ============================================================================
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.12.0
    hooks:
      - id: pretty-format-yaml
        name: Format YAML files
        args: [--autofix, --indent=2]

  # ============================================================================
  # Markdown checks
  # ============================================================================
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        name: Format Markdown files
        additional_dependencies:
          - mdformat-gfm
          - mdformat-black
        args: [--wrap=80]

  # ============================================================================
  # Requirements checks
  # ============================================================================
  - repo: https://github.com/PyCQA/pip-audit
    rev: v2.6.3
    hooks:
      - id: pip-audit
        name: Audit dependencies
        args: [--skip-editable]

  # ============================================================================
  # Dockerfile linting
  # ============================================================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfile

# ============================================================================
# CI configuration
# ============================================================================
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
    
    for more information, see https://pre-commit.ci
  
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [pip-audit, hadolint-docker]  # Skip slow hooks in CI
  submodules: false
