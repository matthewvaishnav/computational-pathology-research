apiVersion: v1
kind: Service
metadata:
  name: medical-ai-api-service
  namespace: medical-ai
  labels:
    app: medical-ai-api
    component: api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"  # For AWS
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: medical-ai-api
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: medical-ai-api-internal
  namespace: medical-ai
  labels:
    app: medical-ai-api
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: medical-ai-api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medical-ai-ingress
  namespace: medical-ai
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.medical-ai.yourdomain.com
    secretName: medical-ai-tls
  rules:
  - host: api.medical-ai.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: medical-ai-api-internal
            port:
              number: 8000