apiVersion: v1
kind: Service
metadata:
  name: pathology-api
  namespace: pathology
  labels:
    app: pathology-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: pathology-api
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: pathology-api-internal
  namespace: pathology
  labels:
    app: pathology-api
spec:
  type: ClusterIP
  selector:
    app: pathology-api
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: http
