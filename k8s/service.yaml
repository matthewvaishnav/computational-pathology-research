apiVersion: v1
kind: Service
metadata:
  name: histocore
  labels:
    app: histocore
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: histocore
---
apiVersion: v1
kind: Service
metadata:
  name: histocore-metrics
  labels:
    app: histocore
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: metrics
  selector:
    app: histocore
