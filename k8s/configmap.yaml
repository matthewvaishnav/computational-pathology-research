apiVersion: v1
kind: ConfigMap
metadata:
  name: medical-ai-config
  namespace: medical-ai
data:
  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  
  # Model Configuration
  MODELS_DIR: "/app/models"
  DEFAULT_DISEASE_TYPE: "breast_cancer"
  MODEL_CACHE_SIZE: "2"
  
  # File Storage
  UPLOAD_DIR: "/tmp/medical_ai_uploads"
  MAX_FILE_SIZE_MB: "100"
  
  # Monitoring
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
  
  # Rate Limiting
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_BURST: "10"
  
  # Health Check
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "10"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: medical-ai
data:
  POSTGRES_DB: "medical_ai"
  POSTGRES_USER: "medical_ai_user"
  PGDATA: "/var/lib/postgresql/data/pgdata"