apiVersion: v1
kind: Secret
metadata:
  name: {{ include "histocore.fullname" . }}-secrets
  labels:
    {{- include "histocore.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database credentials
  DATABASE_HOST: {{ .Values.secrets.database.host | quote }}
  DATABASE_PORT: {{ .Values.secrets.database.port | quote }}
  DATABASE_NAME: {{ .Values.secrets.database.name | quote }}
  DATABASE_USER: {{ .Values.secrets.database.user | quote }}
  DATABASE_PASSWORD: {{ .Values.secrets.database.password | quote }}
  
  # API keys
  API_KEY_ADMIN: {{ .Values.secrets.apiKeys.admin | quote }}
  API_KEY_SERVICE: {{ .Values.secrets.apiKeys.service | quote }}
