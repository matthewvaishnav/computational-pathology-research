apiVersion: apps/v1
kind: Deployment
metadata:
  name: histocore
  labels:
    app: histocore
spec:
  replicas: 3
  selector:
    matchLabels:
      app: histocore
  template:
    metadata:
      labels:
        app: histocore
    spec:
      containers:
      - name: histocore
        image: histocore:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: histocore-config
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /app/models
          readOnly: true
        - name: cache
          mountPath: /app/cache
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: histocore-models
      - name: cache
        emptyDir:
          sizeLimit: 10Gi
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
