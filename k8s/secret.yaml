apiVersion: v1
kind: Secret
metadata:
  name: pathology-secrets
  namespace: pathology
type: Opaque
stringData:
  # API keys (replace with actual values)
  api-key: "your-api-key-here"
  
  # Database credentials (if needed)
  db-username: "pathology_user"
  db-password: "change-me-in-production"
  
  # Weights & Biases API key (if using)
  wandb-api-key: "your-wandb-key-here"
  
  # AWS credentials (if needed)
  aws-access-key-id: "your-aws-access-key"
  aws-secret-access-key: "your-aws-secret-key"

---
# Note: In production, use external secret management like:
# - AWS Secrets Manager
# - HashiCorp Vault
# - Sealed Secrets
# - External Secrets Operator
#
# Example with External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: pathology-secrets
#   namespace: pathology
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: SecretStore
#   target:
#     name: pathology-secrets
#   data:
#   - secretKey: api-key
#     remoteRef:
#       key: pathology/api-key
