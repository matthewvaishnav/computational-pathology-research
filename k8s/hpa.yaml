# Horizontal Pod Autoscaler for HistoCore streaming
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: histocore-streaming-hpa
  namespace: histocore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: histocore-streaming
  
  minReplicas: 2
  maxReplicas: 10
  
  metrics:
  # CPU utilization
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # Memory utilization
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  # Custom metrics (if available)
  - type: Pods
    pods:
      metric:
        name: histocore_processing_queue_length
      target:
        type: AverageValue
        averageValue: "10"
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60