# Ingress for HistoCore streaming external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: histocore-ingress
  namespace: histocore
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - histocore.example.com
    - api.histocore.example.com
    - metrics.histocore.example.com
    secretName: histocore-tls
  
  rules:
  # Main dashboard
  - host: histocore.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: histocore-streaming
            port:
              number: 8000
  
  # API endpoint
  - host: api.histocore.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: histocore-streaming
            port:
              number: 8001
  
  # Metrics endpoint (internal only)
  - host: metrics.histocore.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: histocore-streaming
            port:
              number: 8002