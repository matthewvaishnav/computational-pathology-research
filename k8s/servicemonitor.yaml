apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pathology-api-monitor
  namespace: pathology
  labels:
    app: pathology-api
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: pathology-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
