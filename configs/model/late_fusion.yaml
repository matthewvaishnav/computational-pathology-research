# @package model
# Late fusion baseline configuration

name: late_fusion

# Model architecture
embed_dim: 256
dropout: 0.1

# WSI encoder config
wsi_config:
  input_dim: 1024
  hidden_dim: 512
  num_heads: 8
  num_layers: 2
  pooling: attention

# Genomic encoder config
genomic_config:
  input_dim: 2000
  hidden_dims: [1024, 512]
  use_batch_norm: true

# Clinical text encoder config
clinical_config:
  vocab_size: 30000
  embed_dim: 256
  hidden_dim: 512
  num_heads: 8
  num_layers: 3
  max_seq_length: 512
  pooling: mean
