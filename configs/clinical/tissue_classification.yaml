  muscle:
    risk_threshold: 0.3
    confidence_threshold: 0.80
    anomaly_threshold: 0.4
    
  smooth_muscle:
    risk_threshold: 0.3
    confidence_threshold: 0.85
    anomaly_threshold: 0.4
    
  skeletal_muscle:
    risk_threshold: 0.3
    confidence_threshold: 0.85
    anomaly_threshold: 0.4
    
  cardiac_muscle:
    risk_threshold: 0.4
    confidence_threshold: 0.85
