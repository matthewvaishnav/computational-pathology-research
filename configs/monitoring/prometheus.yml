# Prometheus configuration for Federated Learning monitoring

global:
  scrape_interval: 15s  # Scrape metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'federated-learning'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - 'alert_rules.yml'

# Scrape configurations
scrape_configs:
  # FL Coordinator metrics
  - job_name: 'fl_coordinator'
    static_configs:
      - targets: ['localhost:9090']
    file_sd_configs:
      - files:
          - '/fl_metrics/prometheus.txt'
        refresh_interval: 10s

  # FL Client metrics (if clients expose metrics)
  - job_name: 'fl_clients'
    static_configs:
      - targets:
          - 'client1:9091'
          - 'client2:9091'
          - 'client3:9091'
    relabel_configs:
      - source_labels: [__address__]
        target_label: client_id
        regex: '(.+):.+'
        replacement: '${1}'

  # System metrics (node exporter)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
