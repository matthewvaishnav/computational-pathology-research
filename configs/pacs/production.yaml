# Production PACS Configuration
# This configuration is for production hospital environments

profile_name: "production"

pacs_endpoints:
  primary:
    endpoint_id: "primary_pacs"
    ae_title: "HISTOCORE_PROD"
    host: "pacs.hospital.org"
    port: 11112
    vendor: "GE"
    is_primary: true
    description: "Primary GE PACS server"
    security_config:
      tls_enabled: true
      tls_version: "1.3"
      certificate_path: "/etc/ssl/certs/pacs.crt"
      client_cert_path: "/etc/ssl/private/histocore.crt"
      client_key_path: "/etc/ssl/private/histocore.key"
      ca_bundle_path: "/etc/ssl/certs/ca-bundle.crt"
      verify_certificates: true
      mutual_authentication: true
    performance_config:
      max_concurrent_studies: 50
      connection_pool_size: 10
      query_timeout: 30
      retrieval_timeout: 300
      storage_timeout: 120
      retry_attempts: 5
      retry_delay: 2.0
      max_retry_delay: 60.0

  backup:
    endpoint_id: "backup_pacs"
    ae_title: "HISTOCORE_BACKUP"
    host: "pacs-backup.hospital.org"
    port: 11112
    vendor: "Philips"
    is_primary: false
    description: "Backup Philips PACS server"
    security_config:
      tls_enabled: true
      tls_version: "1.3"
      certificate_path: "/etc/ssl/certs/pacs-backup.crt"
      client_cert_path: "/etc/ssl/private/histocore.crt"
      client_key_path: "/etc/ssl/private/histocore.key"
      ca_bundle_path: "/etc/ssl/certs/ca-bundle.crt"
      verify_certificates: true
      mutual_authentication: true
    performance_config:
      max_concurrent_studies: 25
      connection_pool_size: 5
      query_timeout: 30
      retrieval_timeout: 300
      storage_timeout: 120
      retry_attempts: 3
      retry_delay: 1.0
      max_retry_delay: 30.0

storage_config:
  local_cache_path: "/var/histocore/cache"
  max_cache_size_gb: 500
  cleanup_threshold_gb: 50
  temp_directory: "/tmp/histocore"
  archive_directory: "/var/histocore/archive"

notification_config:
  enabled: true
  channels:
    email:
      enabled: true
      smtp_server: "smtp.hospital.org"
      smtp_port: 587
      use_tls: true
      username: "histocore@hospital.org"
      # Password should be set via environment variable
    sms:
      enabled: false
      provider: "twilio"
      # Credentials should be set via environment variables
    hl7:
      enabled: true
      server: "hl7.hospital.org"
      port: 2575
  
  recipients:
    pathologists:
      - "pathologist1@hospital.org"
      - "pathologist2@hospital.org"
    administrators:
      - "admin@hospital.org"
      - "it-support@hospital.org"

audit_config:
  enabled: true
  storage_path: "/var/log/histocore/audit"
  retention_years: 7
  encryption_enabled: true
  tamper_evident: true
  archive_threshold_gb: 10
  archive_path: "/var/histocore/audit-archive"
  
  # HIPAA compliance settings
  hipaa_compliant: true
  log_phi_access: true
  include_user_details: true
  include_network_details: true