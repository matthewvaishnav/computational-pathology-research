# Staging PACS Configuration
# This configuration is for staging/testing environments that mirror production

profile_name: "staging"

pacs_endpoints:
  staging_primary:
    endpoint_id: "staging_pacs"
    ae_title: "HISTOCORE_STAGE"
    host: "pacs-staging.hospital.org"
    port: 11112
    vendor: "GE"
    is_primary: true
    description: "Staging GE PACS server"
    security_config:
      tls_enabled: true
      tls_version: "1.3"
      certificate_path: "/etc/ssl/certs/pacs-staging.crt"
      client_cert_path: "/etc/ssl/private/histocore-staging.crt"
      client_key_path: "/etc/ssl/private/histocore-staging.key"
      ca_bundle_path: "/etc/ssl/certs/ca-bundle.crt"
      verify_certificates: true
      mutual_authentication: true
    performance_config:
      max_concurrent_studies: 20
      connection_pool_size: 5
      query_timeout: 30
      retrieval_timeout: 300
      storage_timeout: 120
      retry_attempts: 3
      retry_delay: 1.0
      max_retry_delay: 30.0

storage_config:
  local_cache_path: "/var/histocore-staging/cache"
  max_cache_size_gb: 100
  cleanup_threshold_gb: 20
  temp_directory: "/tmp/histocore-staging"
  archive_directory: "/var/histocore-staging/archive"

notification_config:
  enabled: true
  channels:
    email:
      enabled: true
      smtp_server: "smtp-staging.hospital.org"
      smtp_port: 587
      use_tls: true
      username: "histocore-staging@hospital.org"
    sms:
      enabled: false
    hl7:
      enabled: false
  
  recipients:
    pathologists:
      - "test-pathologist@hospital.org"
    administrators:
      - "staging-admin@hospital.org"

audit_config:
  enabled: true
  storage_path: "/var/log/histocore-staging/audit"
  retention_years: 2
  encryption_enabled: true
  tamper_evident: true
  archive_threshold_gb: 5
  archive_path: "/var/histocore-staging/audit-archive"
  
  # Production-like settings for staging
  hipaa_compliant: true
  log_phi_access: true
  include_user_details: true
  include_network_details: true