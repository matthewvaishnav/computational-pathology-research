version: '3.8'

services:
  coordinator:
    build:
      context: ../..
      dockerfile: docker/federated/Dockerfile.coordinator
    container_name: fl-coordinator
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./certs:/app/certs:ro
      - ./configs:/app/configs:ro
      - coordinator-checkpoints:/app/checkpoints
      - coordinator-logs:/app/logs
      - coordinator-data:/app/data
    environment:
      - FL_COORDINATOR_HOST=0.0.0.0
      - FL_COORDINATOR_PORT=8080
      - FL_NUM_ROUNDS=100
      - FL_MIN_CLIENTS=3
    networks:
      - federated-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  client-1:
    build:
      context: ../..
      dockerfile: docker/federated/Dockerfile.client
    container_name: fl-client-1
    depends_on:
      - coordinator
    volumes:
      - ./certs:/app/certs:ro
      - ./configs/client-1.yaml:/app/configs/federated/client.yaml:ro
      - client-1-checkpoints:/app/checkpoints
      - client-1-logs:/app/logs
      - client-1-data:/app/data
    environment:
      - FL_CLIENT_ID=hospital-001
      - FL_COORDINATOR_URL=https://coordinator:8080
      - CUDA_VISIBLE_DEVICES=0
    networks:
      - federated-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  client-2:
    build:
      context: ../..
      dockerfile: docker/federated/Dockerfile.client
    container_name: fl-client-2
    depends_on:
      - coordinator
    volumes:
      - ./certs:/app/certs:ro
      - ./configs/client-2.yaml:/app/configs/federated/client.yaml:ro
      - client-2-checkpoints:/app/checkpoints
      - client-2-logs:/app/logs
      - client-2-data:/app/data
    environment:
      - FL_CLIENT_ID=hospital-002
      - FL_COORDINATOR_URL=https://coordinator:8080
      - CUDA_VISIBLE_DEVICES=0
    networks:
      - federated-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  client-3:
    build:
      context: ../..
      dockerfile: docker/federated/Dockerfile.client
    container_name: fl-client-3
    depends_on:
      - coordinator
    volumes:
      - ./certs:/app/certs:ro
      - ./configs/client-3.yaml:/app/configs/federated/client.yaml:ro
      - client-3-checkpoints:/app/checkpoints
      - client-3-logs:/app/logs
      - client-3-data:/app/data
    environment:
      - FL_CLIENT_ID=hospital-003
      - FL_COORDINATOR_URL=https://coordinator:8080
      - CUDA_VISIBLE_DEVICES=0
    networks:
      - federated-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:latest
    container_name: fl-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - federated-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fl-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - federated-network
    restart: unless-stopped

networks:
  federated-network:
    driver: bridge

volumes:
  coordinator-checkpoints:
  coordinator-logs:
  coordinator-data:
  client-1-checkpoints:
  client-1-logs:
  client-1-data:
  client-2-checkpoints:
  client-2-logs:
  client-2-data:
  client-3-checkpoints:
  client-3-logs:
  client-3-data:
  prometheus-data:
  grafana-data:
